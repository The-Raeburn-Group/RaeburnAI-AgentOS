name: Repository Health

on:
  pull_request:
  push:
    branches: [main]

jobs:
  documentation:
    name: Documentation check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Check required documentation
        run: |
          test -f README.md
          test -f docs/ECOSYSTEM.md
