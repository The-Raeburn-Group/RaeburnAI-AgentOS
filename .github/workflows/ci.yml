name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: agentos
          POSTGRES_USER: agentos
          POSTGRES_PASSWORD: agentos
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agentos -d agentos"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://agentos:agentos@localhost:5432/agentos?schema=public
      NEXTAUTH_SECRET: test-secret-for-ci-only-change-in-prod
      OLLAMA_BASE_URL: http://localhost:11434
      DEFAULT_MODEL_PROVIDER: ollama
      DEFAULT_MODEL: llama3.1
      CI: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm audit --audit-level=high
      - run: npm run db:generate
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: docker build -t raeburnai-agentos .
